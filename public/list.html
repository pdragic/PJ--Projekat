<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekipa Barselone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        table {
            width: 100%;
        }

        td,
        th {
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>

<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container">
            <a class="navbar-brand" href="./index.html">
                <i class="fa-solid fa-futbol"></i> Ekipa Barselone
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">
                            <i class="fa-regular fa-house"></i> Pocetna
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./list.html">
                            <i class="fa-solid fa-list"></i> Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./teams.html">
                            <i class="fa-solid fa-people-group"></i> Timovi
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-3">
        <table class="table table-dark table-striped table-hover">
            <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Ime</th>
                    <th>Pozicija</th>
                    <th>Visina</th>
                    <th>Težina</th>
                    <th>Godine</th>
                    <th>Nacionalnost</th>
                    <th>Broj Dresa</th>
                    <th>O igracu</th>
                </tr>
            </thead>
            <tbody id="players"></tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/alerts.js"></script>
    <script>
        retrieveData('/api/teams/barcelona-roster', (data) => {
            const igraci = data.athletes || []

            const grupe = {
                'Golmani': igraci.filter(p => p.position?.name === 'Goalkeeper'),
                'Odbrana': igraci.filter(p => p.position?.name === 'Defender'),
                'Vezni red': igraci.filter(p => p.position?.name === 'Midfielder'),
                'Napad': igraci.filter(p => p.position?.name === 'Forward')
            }

            const lista = document.getElementById('players')
            let content = ''
            let broj = 1

            for (let [naziv, grupa] of Object.entries(grupe)) {

                if (grupa.length === 0) continue;

                content += `
                        <tr class="table-warning">
                            <td colspan="9" class="fw-bold text-center">
                                ${naziv}
                            </td>
                        </tr>
                    `

                for (let player of grupa) {
                    content += `
                            <tr>
                                <td>${broj++}</td>
                                <td>${player.fullName || "-"}</td>
                                <td>${player.position?.name || "-"}</td>
                                <td>${player.displayHeight || "-"}</td>
                                <td>${player.displayWeight || "-"}</td>
                                <td>${player.age || "-"}</td>
                                <td>${player.citizenship || "-"}</td>
                                <td>${player.jersey || "-"}</td>
                                <td>
                                    <a href="data.html?id=${player.id}" class="btn btn-primary btn-sm">
                                        <i class="fa-solid fa-circle-info"></i> Podaci
                                    </a>
                                </td>
                            </tr>
                        `
                }
            }
            lista.innerHTML = content
        })
    </script>
</body>

</html>
