<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Tim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/public.css" />
</head>

<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container">
            <a class="navbar-brand" href="./index.html">
                <i class="fa-solid fa-futbol"></i> Ekipa Barselone
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">
                            <i class="fa-regular fa-house"></i> Pocetna
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./list.html">
                            <i class="fa-solid fa-list"></i> Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./teams.html">
                            <i class="fa-solid fa-people-group"></i> Timovi
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="container mt-3" style="max-width: 500px;">
            <div class="card">
                <div class="card-header">
                    <strong>Novi tim</strong>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Ime tima</label>
                        <input type="text" id="name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sport</label>
                        <input type="text" id="sport" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Grad</label>
                        <input type="text" id="city" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Liga</label>
                        <input type="text" id="league" class="form-control">
                    </div>
                </div>
                <div class="card-footer">
                    <button type="button" class="btn btn-success" onclick="sacuvaj()">
                        <i class="fa-solid fa-floppy-disk"></i> Sačuvaj
                    </button>
                    <a href="/teams.html" class="btn btn-secondary ms-2">
                        <i class="fa-solid fa-arrow-left"></i> Nazad
                    </a>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="/js/alerts.js"></script>
        <script>
            function sacuvaj() {
                showConfirm('Da li si siguran?', () => {
                    const team = {
                        name: document.getElementById('name').value,
                        sport: document.getElementById('sport').value,
                        city: document.getElementById('city').value,
                        league: document.getElementById('league').value,
                        createdAt: new Date().toISOString().slice(0, 19)
                    }

                    fetch('/api/teams', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(team)
                    })
                        .then(() => window.location.href = '/teams.html')
                })
            }
        </script>

</body>

</html>
