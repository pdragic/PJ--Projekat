<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekipa Barselone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #players {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }

        .barcelona-card {
            width: 18rem;
        }
    </style>
</head>

<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container">
            <a class="navbar-brand" href="./index.html">
                <i class="fa-solid fa-futbol"></i> Ekipa Barselone
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="./index.html">
                            <i class="fa-regular fa-house"></i> Pocetna
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./list.html">
                            <i class="fa-solid fa-list"></i> Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./teams.html">
                            <i class="fa-solid fa-people-group"></i> Timovi
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div id="players" class="container"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/esp.1/teams/83/roster')
            .then(rsp => rsp.json())
            .then(data => {
                const igraci = data.athletes || []

                const grupe = {
                    'Golmani': igraci.filter(p => p.position?.name === 'Goalkeeper'),
                    'Odbrana': igraci.filter(p => p.position?.name === 'Defender'),
                    'Vezni red': igraci.filter(p => p.position?.name === 'Midfielder'),
                    'Napad': igraci.filter(p => p.position?.name === 'Forward')
                }

                const lista = document.getElementById('players')
                let content = ''

                for (let [naziv, grupa] of Object.entries(grupe)) {
                    if (grupa.length === 0) continue

                    content += `<h3 class="mt-4 mb-3">${naziv}</h3><div class="row">`

                    for (let player of grupa) {
                        const ime = player.fullName
                        const pozicija = player.position?.name
                        const slika = `https://ui-avatars.com/api/?name=${encodeURIComponent(ime)}&background=random&size=200&bold=true`

                        content += `
                            <div class="col-6 col-md-3 mb-3">
                            <div class="card barcelona-card">
                                <img src="${slika}" class="card-img-top">
                                <div class="card-body p-2">
                                <h6 class="card-title">${ime}</h6>
                                <p class="card-text small">${pozicija}</p>
                                <a href="data.html?id=${player.id}" class="btn btn-primary btn-sm">
                                    <i class="fa-solid fa-circle-info"></i> Podaci
                                </a>
                                </div>
                            </div>
                            </div>
                        `
                    }

                    content += `</div>`
                }

                lista.innerHTML = content
            })
    </script>
</body>

</html>
