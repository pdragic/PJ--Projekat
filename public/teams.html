<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timovi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container">
            <a class="navbar-brand" href="./index.html">
                <i class="fa-solid fa-futbol"></i> Ekipa Barselone
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">
                            <i class="fa-regular fa-house"></i> Pocetna
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./list.html">
                            <i class="fa-solid fa-list"></i> Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./teams.html">
                            <i class="fa-solid fa-people-group"></i> Timovi
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-3">
        <table class="table table-dark table-striped table-hover">
            <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Ime</th>
                    <th>Sport</th>
                    <th>Grad</th>
                    <th>Liga</th>
                </tr>
            </thead>
            <tbody id="teams"></tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const teams = document.getElementById('teams')

        fetch('/api/teams')
            .then(rsp => rsp.json())
            .then(data => {
                let content = ''

                for (let team of data) {
                    content += `
                    <tr>
                        <td>${team.id}</td>
                        <td>${team.name}</td>
                        <td>${team.sport}</td>
                        <td>${team.city}</td>
                        <td>${team.league}</td>
                    </tr>
                    `
                }

                teams.innerHTML = content
            })
    </script>
</body>

</html>
